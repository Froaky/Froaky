<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">How Mateo works</title>
  <desc id="desc">Four step delivery flow: understand the operation, model the domain, build the workflow and leave evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12001F"/>
      <stop offset="0.52" stop-color="#32106D"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="260" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="52" x2="1120" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0ABFC"/>
      <stop offset="0.48" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" rx="24" fill="url(#bg)"/>
  <path d="M110 132 H1090" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-opacity="0.65"/>

  <g transform="translate(62 48)">
    <rect width="246" height="164" rx="20" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <circle cx="44" cy="43" r="22" fill="#7C3AED"/>
    <text x="37" y="51" fill="#FFFFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="800">1</text>
    <text x="26" y="88" fill="#FFFFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="800">Understand</text>
    <text x="26" y="119" fill="#DDD6FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="600">Map the real operation,</text>
    <text x="26" y="143" fill="#DDD6FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="600">pain points and users.</text>
  </g>

  <g transform="translate(334 48)">
    <rect width="246" height="164" rx="20" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <circle cx="44" cy="43" r="22" fill="#8B5CF6"/>
    <text x="37" y="51" fill="#FFFFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="800">2</text>
    <text x="26" y="88" fill="#FFFFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="800">Model</text>
    <text x="26" y="119" fill="#DDD6FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="600">Protect business rules</text>
    <text x="26" y="143" fill="#DDD6FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="600">in data and services.</text>
  </g>

  <g transform="translate(606 48)">
    <rect width="246" height="164" rx="20" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <circle cx="44" cy="43" r="22" fill="#A855F7"/>
    <text x="37" y="51" fill="#FFFFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="800">3</text>
    <text x="26" y="88" fill="#FFFFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="800">Build</text>
    <text x="26" y="119" fill="#DDD6FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="600">Ship usable screens,</text>
    <text x="26" y="143" fill="#DDD6FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="600">dashboards and flows.</text>
  </g>

  <g transform="translate(878 48)">
    <rect width="246" height="164" rx="20" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <circle cx="44" cy="43" r="22" fill="#C084FC"/>
    <text x="37" y="51" fill="#111827" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="800">4</text>
    <text x="26" y="88" fill="#FFFFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="800">Prove</text>
    <text x="26" y="119" fill="#DDD6FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="600">Add tests, docs and</text>
    <text x="26" y="143" fill="#DDD6FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="600">clear decisions.</text>
  </g>
</svg>
